name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "Error: package.json version ($PKG_VERSION) does not match tag (${{ github.ref_name }})" >&2
            exit 1
          fi
          echo "Version guard passed: $PKG_VERSION"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Docker image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: panthalnet/arike
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=beta,enable=${{ contains(github.ref_name, '-') }}

      - name: Build and push multi-platform image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Container smoke test
        shell: bash
        run: |
          docker pull panthalnet/arike:${{ github.ref_name }}
          docker run -d \
            --name arike-smoke \
            -p 3000:3000 \
            -e DATA_DIR=/tmp/data \
            panthalnet/arike:${{ github.ref_name }}
          echo "Waiting for container to be ready..."
          for i in $(seq 1 24); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "✓ Health check passed"
              docker stop arike-smoke
              docker rm arike-smoke
              exit 0
            fi
            sleep 5
          done
          echo "Error: health check did not pass within 2 minutes" >&2
          docker logs arike-smoke
          docker stop arike-smoke
          docker rm arike-smoke
          exit 1
